<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bughouse Classic - Study Tool</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-brand">
            <span class="header-icon">♜</span>
            <div class="header-text">
                <span class="header-title">Bughouse Classic</span>
                <span class="header-subtitle">ADAM STUDY TOOL</span>
            </div>
        </div>
    </header>

    <main>
        <div class="bughouse-container">
            <!-- Board A -->
            <div class="board-wrapper board-a-wrapper">
                <div class="side-clock side-clock-left">
                    <div class="clock-label">White</div>
                    <div class="clock-display" id="clock-a-white">--:--</div>
                </div>
                <div class="side-clock side-clock-left-black">
                    <div class="clock-label">Black</div>
                    <div class="clock-display" id="clock-a-black">--:--</div>
                </div>
                
                <div class="board-container" data-board="a" data-team="white">
                    <div class="board-header">
                        <h2>♔ Board A</h2>
                        <div class="board-header-right">
                            <div class="turn-indicator" id="turn-a">White to move</div>
                            <button class="btn-undo-compact" data-board="a" title="Undo Board A">↩ Undo</button>
                        </div>
                    </div>
                    
                    <div class="captured-section">
                        <div class="captured-pieces captured-partner" data-board="a" data-source="b">
                            <div class="captured-content"></div>
                        </div>
                    </div>
                    
                    <div class="chess-board-container">
                        <div class="chess-board" id="board-a"></div>
                        <div class="board-overlay" id="overlay-a"></div>
                    </div>
                    
                    <div class="captured-section captured-section-bottom">
                        <div class="captured-pieces captured-by-partner" data-board="a" data-destination="b">
                            <div class="captured-content"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Center Controls -->
            <div class="center-controls">
                <div class="control-panel">
                    <div class="status-display">
                        <div class="status-label">📋 Game Status:</div>
                        <div class="status-value" id="selected-piece">Click or drag pieces to move</div>
                    </div>
                    <div class="control-buttons">
                        <button class="btn btn-secondary" id="reset">Reset</button>
                        <button class="btn btn-secondary" id="undo-master">Undo</button>
                        <button class="btn btn-secondary" id="redo-master">Redo</button>
                        <button class="btn btn-primary" id="play-pause-btn">▶ Play</button>
                        <button class="btn btn-secondary" id="open-setup-panel">Setup</button>
                    </div>
                </div>
            </div>

            <!-- Board B -->
            <div class="board-wrapper board-b-wrapper">
                <div class="board-container" data-board="b" data-team="black">
                    <div class="board-header">
                        <h2>♚ Board B</h2>
                        <div class="board-header-right">
                            <div class="turn-indicator" id="turn-b">White to move</div>
                            <button class="btn-undo-compact" data-board="b" title="Undo Board B">↩ Undo</button>
                        </div>
                    </div>
                    
                    <div class="captured-section">
                        <div class="captured-pieces captured-partner" data-board="b" data-source="a">
                            <div class="captured-content"></div>
                        </div>
                    </div>
                    
                    <div class="chess-board-container">
                        <div class="chess-board" id="board-b"></div>
                        <div class="board-overlay" id="overlay-b"></div>
                    </div>
                    
                    <div class="captured-section captured-section-bottom">
                        <div class="captured-pieces captured-by-partner" data-board="b" data-destination="a">
                            <div class="captured-content"></div>
                        </div>
                    </div>
                </div>
                
                <div class="side-clock side-clock-right-black">
                    <div class="clock-label">Black</div>
                    <div class="clock-display" id="clock-b-black">--:--</div>
                </div>
                <div class="side-clock side-clock-right">
                    <div class="clock-label">White</div>
                    <div class="clock-display" id="clock-b-white">--:--</div>
                </div>
            </div>
        </div>
    </main>

    <script src="bughouse.js"></script>
</body>
</html>
